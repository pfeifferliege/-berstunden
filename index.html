<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeit-Depot Pro v16</title>
    <style>
        :root {
            --primary: #6c5ce7; --secondary: #a29bfe; --bg: #f0f2f8;
            --plus: #00b894; --minus: #e17055; --white: #ffffff; --warn: #fdcb6e; --danger: #d63031;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 420px; background: var(--white); border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; padding-bottom: 20px; }
        .header { background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 25px 15px; color: white; text-align: center; }
        .header h1 { margin: 0; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 15px; margin-top: -20px; }
        .stat-card { background: var(--white); padding: 12px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .stat-card span { display: block; font-size: 9px; color: #b2bec3; text-transform: uppercase; }
        .stat-card strong { font-size: 18px; color: var(--primary); }
        
        .comp-box { margin: 15px; padding: 15px; background: #f8f9fa; border-radius: 15px; border: 1px solid #eee; }
        .comp-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; align-items: center; }
        .val-real { color: #e67e22; font-weight: bold; }
        .val-free { color: var(--plus); font-weight: bold; }
        .loss-text { font-size: 11px; color: var(--minus); text-align: center; margin-top: 5px; font-style: italic; border-top: 1px dashed #ddd; padding-top: 5px; }

        .input-section { padding: 15px; border-bottom: 1px solid #eee; }
        .type-toggle { display: flex; gap: 8px; margin-bottom: 12px; }
        .type-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; opacity: 0.3; transition: 0.3s; }
        .type-btn.active { opacity: 1; transform: scale(1.02); }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 8px; box-sizing: border-box; font-size: 15px; background: #fdfdfd; }
        .fields-row { display: flex; gap: 10px; width: 100%; margin-bottom: 8px; }
        .fields-row input { flex: 1; margin-bottom: 0; min-width: 0; }
        .btn-save { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 10px rgba(108, 92, 231, 0.2); }
        
        .list { max-height: 200px; overflow-y: auto; padding: 15px; }
        .item { display: flex; justify-content: space-between; padding: 10px; background: #f9fbfd; border-radius: 10px; margin-bottom: 8px; border-left: 4px solid #ddd; }
        .item.plus { border-left-color: var(--plus); }
        .item.minus { border-left-color: var(--minus); }
        
        .wage-config { padding: 15px; background: #fffcf0; border-top: 2px solid var(--warn); margin-bottom: 10px; }
        .wage-inputs { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .wage-row-top { display: flex; gap: 8px; }
        .wage-row-top input { margin-bottom: 0; }
        .btn-wage-set { width: 100%; padding: 10px; background: var(--warn); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        
        .btn-delete-all { width: calc(100% - 30px); margin: 0 15px; padding: 12px; background: var(--danger); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .del-btn { border: none; background: none; color: #ff7675; font-size: 18px; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header"><h1>ZEIT-DEPOT PRO</h1></div>

    <div class="dashboard">
        <div class="stat-card"><span>Stunden Saldo</span><strong id="totalH">0.0</strong></div>
        <div class="stat-card"><span>Freie Tage (8h)</span><strong id="totalD">0.0</strong></div>
    </div>

    <div class="comp-box">
        <div class="comp-row">
            <span style="font-size: 11px;">Auszahlung <br><small id="wageDisplay" style="color:#636e72;">[0,00 / 0,00] Netto h</small></span>
            <span id="resReal" class="val-real">0,00 €</span>
        </div>
        <div class="comp-row" style="margin-top: 10px;">
            <span>Wert als Freizeit (Netto):</span>
            <span id="resFree" class="val-free">0,00 €</span>
        </div>
        <div id="resLoss" class="loss-text">Steuer-Verlust bei Auszahlung: 0,00 €</div>
    </div>

    <div class="input-section">
        <div class="type-toggle">
            <button id="btnPlus" class="type-btn active" style="background:var(--plus);color:white" onclick="setType('plus')">+ Überstunden</button>
            <button id="btnMinus" class="type-btn" style="background:var(--minus);color:white" onclick="setType('minus')">- Überstunden</button>
        </div>
        
        <input type="date" id="dateIn">
        
        <div class="fields-row">
            <input type="number" id="hourIn" placeholder="Stdn" step="0.5" inputmode="decimal">
            <input type="number" id="dayIn" placeholder="Tage" step="0.5" inputmode="decimal" style="display:none">
        </div>

        <input type="text" id="noteIn" placeholder="Notiz (optional)">
        <button class="btn-save" onclick="addEntry()">Speichern & Leeren</button>
    </div>

    <div id="entryList" class="list"></div>

    <div class="wage-config">
        <h4 style="margin:0 0 10px 0; font-size:14px">Lohn-Historie verwalten</h4>
        <div class="wage-inputs">
            <div class="wage-row-top">
                <input type="date" id="wageDate" style="flex: 1.5;">
                <input type="number" id="wageVal" placeholder="Lohn €" step="0.01" style="flex: 1;">
            </div>
            <button onclick="addWage()" class="btn-wage-set">Neuen Lohn ab Datum setzen</button>
        </div>
        <div id="wageList" style="font-size:10px; color:#636e72; line-height: 1.4;">Noch kein Lohn hinterlegt.</div>
    </div>

    <button class="btn-delete-all" onclick="deleteAllData()">⚠ KOMPLETTES DEPOT LÖSCHEN</button>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('depot_v16_data')) || [];
    let wages = JSON.parse(localStorage.getItem('depot_v16_wages')) || [];
    let currentType = 'plus';

    function setType(t) {
        currentType = t;
        document.getElementById('btnPlus').classList.toggle('active', t === 'plus');
        document.getElementById('btnMinus').classList.toggle('active', t === 'minus');
        document.getElementById('dayIn').style.display = (t === 'minus') ? 'block' : 'none';
    }

    function addWage() {
        const d = document.getElementById('wageDate').value, w = parseFloat(document.getElementById('wageVal').value);
        if(d && w) {
            wages.push({date: d, wage: w});
            wages.sort((a,b) => new Date(a.date) - new Date(b.date));
            localStorage.setItem('depot_v16_wages', JSON.stringify(wages));
            updateUI();
            document.getElementById('wageVal').value = '';
        }
    }

    function getWageForDate(targetDate) {
        if (wages.length === 0) return 0;
        let activeWage = wages[0].wage;
        for(let w of wages) {
            if(new Date(targetDate) >= new Date(w.date)) activeWage = w.wage;
        }
        return activeWage;
    }

    function calculateDynamicNetto(brutto, totalHours) {
        let nettoFaktor = 0.62; 
        let progressionsAbzug = Math.floor(totalHours / 30) * 0.01;
        let finalFaktor = Math.max(0.48, nettoFaktor - progressionsAbzug); 
        return brutto * finalFaktor;
    }

    function updateUI() {
        const list = document.getElementById('entryList');
        const wList = document.getElementById('wageList');
        let totalH = 0, totalReal = 0, totalFree = 0;
        
        list.innerHTML = '';
        data.sort((a,b) => new Date(b.date) - new Date(a.date));

        data.forEach(e => {
            totalH += (e.type === 'plus' ? parseFloat(e.hours) : -parseFloat(e.hours));
        });
        
        // Aktuellen Lohn für die Info-Anzeige holen
        const latestWage = wages.length > 0 ? wages[wages.length-1].wage : 0;
        const regNetto = latestWage * 0.70; // Regulär 70% Netto-Annahme
        const dynNettoProStunde = calculateDynamicNetto(latestWage, totalH);

        data.forEach((e, i) => {
            const wage = getWageForDate(e.date);
            const isPlus = e.type === 'plus';
            const hours = parseFloat(e.hours);
            totalFree += (isPlus ? hours : -hours) * (wage * 0.7); 
            const dynNetto = calculateDynamicNetto(wage, totalH);
            totalReal += (isPlus ? hours : -hours) * dynNetto;

            list.innerHTML += `<div class="item ${e.type}">
                <div style="font-size:12px"><b>${new Date(e.date).toLocaleDateString('de-DE')}</b><br><span style="color:#999">${e.note || ''}</span></div>
                <div style="text-align:right">
                    <span style="font-weight:bold; color:${isPlus?'var(--plus)':'var(--minus)'}">${isPlus?'+':'-'}${hours.toFixed(1)}h</span><br>
                    <small style="color:#b2bec3">${wage > 0 ? wage.toFixed(2) + '€/h' : '?? €'}</small>
                    <button onclick="delEntry(${i})" class="del-btn">×</button>
                </div>
            </div>`;
        });

        document.getElementById('totalH').innerText = totalH.toFixed(1);
        document.getElementById('totalD').innerText = (totalH / 8).toFixed(1);
        document.getElementById('resReal').innerText = totalReal.toFixed(2).replace('.', ',') + " €";
        document.getElementById('resFree').innerText = totalFree.toFixed(2).replace('.', ',') + " €";
        document.getElementById('resLoss').innerText = "Steuer-Verlust bei Auszahlung: -" + Math.abs(totalFree - totalReal).toFixed(2).replace('.', ',') + " €";
        
        // Anzeige der Lohn-Ratio [Dyn / Reg]
        document.getElementById('wageDisplay').innerText = `[${dynNettoProStunde.toFixed(2)} / ${regNetto.toFixed(2)}] Netto h`;

        if (wages.length > 0) {
            wList.innerHTML = "<b>Lohn-Verlauf:</b> " + wages.map(w => `${new Date(w.date).toLocaleDateString('de-DE', {month:'short', year:'2-digit'})}: ${w.wage.toFixed(2)}€`).join(' | ');
        }
        localStorage.setItem('depot_v16_data', JSON.stringify(data));
    }

    function addEntry() {
        if (wages.length === 0) { alert("Bitte erst Lohn setzen!"); return; }
        const d = document.getElementById('dateIn').value, h = document.getElementById('hourIn').value, di = document.getElementById('dayIn').value, n = document.getElementById('noteIn').value;
        let fH = (h ? parseFloat(h) : 0) + (di ? parseFloat(di) * 8 : 0);
        if(d && fH > 0) {
            data.push({date: d, hours: fH, type: currentType, note: n});
            document.getElementById('hourIn').value = ''; document.getElementById('dayIn').value = ''; document.getElementById('noteIn').value = '';
            updateUI();
        }
    }

    function delEntry(i) { if(confirm("Eintrag löschen?")) { data.splice(i, 1); updateUI(); } }
    function deleteAllData() { if(confirm("Wirklich ALLES löschen?")) { localStorage.clear(); location.reload(); } }

    document.getElementById('dateIn').valueAsDate = new Date();
    document.getElementById('wageDate').valueAsDate = new Date();
    updateUI();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeit-Depot Pro v8</title>
    <style>
        :root {
            --primary: #6c5ce7; --secondary: #a29bfe; --bg: #f0f2f8;
            --plus: #00b894; --minus: #e17055; --white: #ffffff; --warn: #fdcb6e;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 420px; background: var(--white); border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 25px 15px; color: white; text-align: center; }
        .header h1 { margin: 0; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 15px; margin-top: -20px; }
        .stat-card { background: var(--white); padding: 12px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .stat-card span { display: block; font-size: 9px; color: #b2bec3; text-transform: uppercase; }
        .stat-card strong { font-size: 18px; color: var(--primary); }
        
        .comp-box { margin: 15px; padding: 15px; background: #f8f9fa; border-radius: 15px; border: 1px solid #eee; }
        .comp-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
        .val-real { color: #e67e22; font-weight: bold; }
        .val-free { color: var(--plus); font-weight: bold; }
        .loss-text { font-size: 11px; color: var(--minus); text-align: center; margin-top: 5px; font-style: italic; }

        .input-section { padding: 15px; border-bottom: 1px solid #eee; }
        .type-toggle { display: flex; gap: 8px; margin-bottom: 12px; }
        .type-btn { flex: 1; padding: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; opacity: 0.3; transition: 0.3s; }
        .type-btn.active { opacity: 1; transform: scale(1.02); }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 8px; box-sizing: border-box; font-size: 15px; background: #fdfdfd; }
        .btn-save { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 10px rgba(108, 92, 231, 0.2); }

        .list { max-height: 200px; overflow-y: auto; padding: 15px; }
        .item { display: flex; justify-content: space-between; padding: 10px; background: #f9fbfd; border-radius: 10px; margin-bottom: 8px; border-left: 4px solid #ddd; transition: 0.2s; }
        .item.plus { border-left-color: var(--plus); }
        .item.minus { border-left-color: var(--minus); }
        
        .wage-config { padding: 15px; background: #fffcf0; border-top: 2px solid var(--warn); }
        .del-btn { border: none; background: none; color: #ff7675; font-size: 18px; cursor: pointer; margin-left: 10px; vertical-align: middle; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header"><h1>ZEIT-DEPOT PRO</h1></div>

    <div class="dashboard">
        <div class="stat-card"><span>Stunden Saldo</span><strong id="totalH">0.0</strong></div>
        <div class="stat-card"><span>Freie Tage (8h)</span><strong id="totalD">0.0</strong></div>
    </div>

    <div class="comp-box">
        <div class="comp-row"><span>Auszahlung (ca. 9€ Netto):</span><span id="resReal" class="val-real">0,00 €</span></div>
        <div class="comp-row"><span>Wert als Freizeit (Netto):</span><span id="resFree" class="val-free">0,00 €</span></div>
        <div id="resLoss" class="loss-text">Steuer-Verlust bei Auszahlung: 0,00 €</div>
    </div>

    <div class="input-section">
        <div class="type-toggle">
            <button id="btnPlus" class="type-btn active" style="background:var(--plus);color:white" onclick="setType('plus')">+ Überstunden</button>
            <button id="btnMinus" class="type-btn" style="background:var(--minus);color:white" onclick="setType('minus')">- Abgefeiert</button>
        </div>
        <input type="date" id="dateIn">
        <input type="number" id="hourIn" placeholder="Anzahl Stunden" step="0.5" inputmode="decimal">
        <input type="text" id="noteIn" placeholder="Notiz (z.B. Monat oder Grund)">
        <button class="btn-save" onclick="addEntry()">Speichern & Leeren</button>
    </div>

    <div id="entryList" class="list"></div>

    <div class="wage-config">
        <h4 style="margin:0 0 10px 0; font-size:14px">Lohn-Historie (Ab Jan 2026)</h4>
        <div style="display:flex; gap:5px; margin-bottom:10px">
            <input type="date" id="wageDate" style="font-size:12px; margin:0">
            <input type="number" id="wageVal" placeholder="Brutto €" style="margin:0">
            <button onclick="addWage()" style="background:var(--warn); border:none; padding:5px 10px; border-radius:8px; font-weight:bold; cursor:pointer">Setzen</button>
        </div>
        <div id="wageList" style="font-size:10px; color:#636e72; line-height:1.4"></div>
    </div>
</div>

<script>
    // Daten laden (v8 nutzt neuen Speicher-Key um Konflikte zu vermeiden)
    let data = JSON.parse(localStorage.getItem('depot_v8_data')) || [];
    // Start-Lohn auf Januar 2026 gesetzt
    let wages = JSON.parse(localStorage.getItem('depot_v8_wages')) || [{date: '2026-01-01', wage: 14.00}];
    let currentType = 'plus';

    function setType(t) {
        currentType = t;
        document.getElementById('btnPlus').classList.toggle('active', t === 'plus');
        document.getElementById('btnMinus').classList.toggle('active', t === 'minus');
    }

    function addWage() {
        const d = document.getElementById('wageDate').value;
        const w = parseFloat(document.getElementById('wageVal').value);
        if(d && w) {
            wages.push({date: d, wage: w});
            wages.sort((a,b) => new Date(a.date) - new Date(b.date));
            localStorage.setItem('depot_v8_wages', JSON.stringify(wages));
            updateUI();
        }
    }

    function getWageForDate(targetDate) {
        let activeWage = wages[0].wage;
        // Da die Liste sortiert ist, finden wir den letzten gültigen Lohn vor/am Datum
        for(let w of wages) {
            if(new Date(targetDate) >= new Date(w.date)) {
                activeWage = w.wage;
            }
        }
        return activeWage;
    }

    function updateUI() {
        const list = document.getElementById('entryList');
        const wList = document.getElementById('wageList');
        let totalH = 0, totalReal = 0, totalFree = 0;
        
        list.innerHTML = '';
        data.sort((a,b) => new Date(b.date) - new Date(a.date));
        
        data.forEach((e, i) => {
            const wage = getWageForDate(e.date);
            const isPlus = e.type === 'plus';
            const hours = parseFloat(e.hours);
            
            totalH += isPlus ? hours : -hours;
            totalReal += (isPlus ? hours : -hours) * 9.00; 
            totalFree += (isPlus ? hours : -hours) * (wage * 0.7); 

            list.innerHTML += `<div class="item ${e.type}">
                <div style="font-size:12px">
                    <b>${new Date(e.date).toLocaleDateString('de-DE')}</b><br>
                    <span style="color:#999">${e.note || ''}</span>
                </div>
                <div style="text-align:right">
                    <span style="font-weight:bold; color:${isPlus?'var(--plus)':'var(--minus)'}">${isPlus?'+':'-'}${hours.toFixed(1)}h</span><br>
                    <small style="color:#b2bec3">${wage.toFixed(2)}€/h</small>
                    <button onclick="delEntry(${i})" class="del-btn">×</button>
                </div>
            </div>`;
        });

        document.getElementById('totalH').innerText = totalH.toFixed(1);
        document.getElementById('totalD').innerText = (totalH / 8).toFixed(1);
        document.getElementById('resReal').innerText = totalReal.toFixed(2).replace('.', ',') + " €";
        document.getElementById('resFree').innerText = totalFree.toFixed(2).replace('.', ',') + " €";
        document.getElementById('resLoss').innerText = "Steuer-Verlust bei Auszahlung: -" + (totalFree - totalReal).toFixed(2).replace('.', ',') + " €";

        wList.innerHTML = "<b>Lohn-Verlauf:</b><br>" + wages.map(w => {
            const d = new Date(w.date).toLocaleDateString('de-DE', {month:'short', year:'numeric'});
            return `${d}: ${w.wage.toFixed(2)} €`;
        }).join(' | ');
        
        localStorage.setItem('depot_v8_data', JSON.stringify(data));
    }

    function addEntry() {
        const d = document.getElementById('dateIn').value;
        const h = document.getElementById('hourIn').value;
        const n = document.getElementById('noteIn').value;
        if(d && h) {
            data.push({date: d, hours: h, type: currentType, note: n});
            // AUTOMATISCHER RESET DER FELDER
            document.getElementById('hourIn').value = ''; 
            document.getElementById('noteIn').value = '';
            updateUI();
        } else {
            alert("Bitte Datum und Stunden eingeben!");
        }
    }

    function delEntry(i) {
        if(confirm("Diesen Eintrag wirklich löschen?")) {
            data.splice(i, 1);
            updateUI();
        }
    }

    // Initialisierung
    document.getElementById('dateIn').valueAsDate = new Date();
    document.getElementById('wageDate').valueAsDate = new Date();
    updateUI();
</script>

</body>
</html>
